<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatDot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Logo palette: white → ice blue → soft teal */
      --bg: #f4f7fa;
      --card: #ffffff;
      --card-border: rgba(180, 210, 230, 0.35);
      --card-shadow: 0 2px 12px rgba(160, 195, 220, 0.12);
      --text-main: #2c3e50;
      --text-muted: #8a9bb0;
      --accent: #7bbad4;
      --accent-deep: #5ca8c8;
      --accent-glow: rgba(123, 186, 212, 0.25);
      --accent-light: rgba(123, 186, 212, 0.08);
      --mint: #8ed4cc;
      --ice: #c8dde8;
      --switch-off: #d8e3ec;
      --switch-on: linear-gradient(135deg, #a8d4e0 0%, #7ecbc5 100%);
      --success: #6dc5a0;
      --danger: #e07070;
      --border-light: rgba(180, 210, 230, 0.25);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    .header {
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      width: 30px; height: 30px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .header-title {
      font-size: 16px; font-weight: 600; letter-spacing: -0.3px;
      color: var(--text-main);
    }
    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }

    .dropdown-container {
      position: relative;
    }

    .icon-btn {
      width: 32px; height: 32px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .icon-btn:hover {
      background: var(--accent-light);
      color: var(--accent-deep);
      border-color: var(--card-border);
    }
    .icon-btn.active {
      background: var(--accent-light);
      color: var(--accent-deep);
    }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ---- Language Dropdown ---- */
    .lang-popup {
      position: absolute;
      top: 100%; right: 0;
      margin-top: 6px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 4px;
      min-width: 128px;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0; pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 28px rgba(140, 180, 210, 0.18);
      z-index: 100;
    }
    .lang-popup.show {
      opacity: 1; pointer-events: auto; transform: translateY(0);
    }
    .lang-option {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: transparent; border: none;
      color: var(--text-muted);
      font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      border-radius: 7px; cursor: pointer;
      transition: all 0.15s;
    }
    .lang-option:hover { background: var(--accent-light); color: var(--text-main); }
    .lang-option.selected { color: var(--accent-deep); background: var(--accent-light); font-weight: 600; }
    .lang-check { width: 14px; display: inline-block; font-size: 13px; line-height: 1; color: var(--accent-deep); }

    /* ---- Main Container ---- */
    .container {
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ---- Group Card ---- */
    .group {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      box-shadow: var(--card-shadow);
    }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .row:hover { background: rgba(123, 186, 212, 0.03); }
    .row:not(:last-child) {
      border-bottom: 1px solid var(--border-light);
    }
    .row-info {
      display: flex; flex-direction: column; gap: 3px;
    }
    .row-title {
      font-size: 13px; font-weight: 500; color: var(--text-main);
    }
    .row-desc {
      font-size: 11px; color: var(--text-muted);
      line-height: 1.4;
    }

    /* ---- Pill Toggle ---- */
    .toggle {
      position: relative;
      width: 40px; height: 22px;
      background: var(--switch-off);
      border-radius: 11px;
      flex-shrink: 0; margin-left: 12px;
      transition: all 0.3s;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .toggle:has(input:checked) {
      background: var(--switch-on);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .toggle:has(input:checked)::after {
      transform: translateX(18px);
    }

    /* ---- Segmented Control ---- */
    .segment {
      display: flex;
      background: var(--switch-off);
      padding: 3px;
      border-radius: 9px;
    }
    .seg-btn {
      flex: 1;
      padding: 7px 12px;
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
      background: transparent; border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .seg-btn:hover:not(.active) { color: var(--text-main); }
    .seg-btn.active {
      background: var(--card);
      color: var(--text-main);
      box-shadow: 0 1px 4px rgba(140, 180, 210, 0.2);
      font-weight: 600;
    }

    /* ---- Status Indicator ---- */
    .status-bar {
      margin: 4px 14px 0;
      padding: 9px;
      border-radius: 10px;
      font-size: 11px; font-weight: 600;
      text-align: center;
      border: 1px solid transparent;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.3s ease;
    }
    .status-bar::before {
      content: ''; display: block; width: 6px; height: 6px;
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    .status-bar.active {
      background: rgba(109, 197, 160, 0.1);
      color: var(--success);
      border-color: rgba(109, 197, 160, 0.2);
    }
    .status-bar.active::before {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }
    .status-bar.inactive {
      background: rgba(224, 112, 112, 0.08);
      color: var(--danger);
      border-color: rgba(224, 112, 112, 0.15);
    }
    .status-bar.inactive::before {
      background: var(--danger);
      box-shadow: 0 0 6px var(--danger);
    }

    /* ---- Modal ---- */
    body.modal-open {
      overflow: hidden;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(28, 47, 68, 0.34);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 120;
    }
    .modal-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-card {
      width: 100%;
      max-width: 292px;
      max-height: 360px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 18px 44px rgba(79, 112, 148, 0.22);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transform: translateY(10px) scale(0.98);
      transition: transform 0.2s ease;
    }
    .modal-backdrop.show .modal-card {
      transform: translateY(0) scale(1);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }
    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-close:hover {
      color: var(--accent-deep);
      background: var(--accent-light);
      border-color: var(--card-border);
    }
    .modal-close svg {
      width: 16px;
      height: 16px;
    }
    .modal-body {
      padding: 10px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }
    .changelog-entry {
      padding: 12px;
      border-radius: 12px;
      background: rgba(123, 186, 212, 0.08);
      border: 1px solid rgba(180, 210, 230, 0.24);
    }
    .changelog-entry-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .changelog-entry-version {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }
    .changelog-entry-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .changelog-entry-list {
      margin: 0;
      padding-left: 16px;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      line-height: 1.45;
    }
    .changelog-empty {
      padding: 14px 4px 4px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    /* ---- Footer ---- */
    .footer {
      padding: 12px 14px 14px;
      display: flex; flex-direction: column; gap: 10px;
      border-top: 1px solid var(--border-light);
      margin-top: 4px;
    }
    .footer-bottom {
      display: flex; align-items: center; justify-content: space-between;
      color: var(--text-muted);
      font-size: 11px;
    }
    .version {
      font-weight: 500;
    }
    #version-num {
      margin-left: 2px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500; color: var(--accent-deep);
    }
    .star-btn {
      width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 11px 12px; border-radius: 12px;
      background: linear-gradient(135deg, #a8d4e0 0%, #7ecbc5 100%);
      color: #fff; text-decoration: none;
      font-weight: 600; font-size: 13px;
      transition: all 0.25s;
      border: none;
      box-shadow: 0 2px 10px rgba(126, 203, 197, 0.3);
      font-family: 'DM Sans', sans-serif;
    }
    .star-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(126, 203, 197, 0.4);
      filter: brightness(1.05);
    }
    .star-btn:active {
      transform: translateY(0);
    }
    .star-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .star-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .star-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.1;
    }
    .star-desc {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.86);
      line-height: 1.3;
    }
    .icon-link {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .icon-link:hover {
      color: var(--accent-deep);
      background: var(--accent-light);
      border-color: var(--card-border);
    }
    .icon-link svg {
      width: 17px;
      height: 17px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
       <img src="icons/logo.png" alt="ChatDot">
    </div>
    <div class="header-title">ChatDot</div>
    <div class="header-right">
      <button class="icon-btn" id="btn-changelog" data-i18n-title="changelog_open" data-i18n-aria-label="changelog_open">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6h11"></path>
          <path d="M9 12h11"></path>
          <path d="M9 18h11"></path>
          <path d="M4 6h.01"></path>
          <path d="M4 12h.01"></path>
          <path d="M4 18h.01"></path>
        </svg>
      </button>
      <div class="dropdown-container">
        <button class="icon-btn" id="btn-lang" title="Language" aria-label="Language">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
        </button>
        <div class="lang-popup" id="lang-popup">
          <button class="lang-option selected" data-lang="zh">
            <span class="lang-check">✓</span> 简体中文
          </button>
          <button class="lang-option" data-lang="en">
            <span class="lang-check"></span> English
          </button>
          <button class="lang-option" data-lang="ja">
            <span class="lang-check"></span> 日本語
          </button>
          <button class="lang-option" data-lang="ko">
            <span class="lang-check"></span> 한국어
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="group">
      <label class="row">
        <div class="row-info">
          <div class="row-title" data-i18n="enable_nav">启用导航栏</div>
        </div>
        <div class="toggle">
          <input type="checkbox" id="toggle-enabled" checked>
        </div>
      </label>
      <label class="row">
        <div class="row-info">
          <div class="row-title" data-i18n="show_preview">悬浮预览</div>
          <div class="row-desc" data-i18n="show_preview_desc">导航按钮悬停显示消息内容</div>
        </div>
        <div class="toggle">
          <input type="checkbox" id="toggle-preview" checked>
        </div>
      </label>
      <label class="row">
        <div class="row-info">
          <div class="row-title" data-i18n="show_outline">消息大纲</div>
          <div class="row-desc" data-i18n="show_outline_desc">侧边栏显示对话索引</div>
        </div>
        <div class="toggle">
          <input type="checkbox" id="toggle-outline" checked>
        </div>
      </label>
    </div>

    <div class="group">
      <div class="row" style="flex-direction: column; align-items: stretch; gap: 10px; cursor: default;">
        <div class="row-info">
          <div class="row-title" data-i18n="display_mode">显示模式</div>
          <div class="row-desc" data-i18n="display_mode_desc">控制导航栏的配色主题</div>
        </div>
        <div class="segment" id="theme-mode">
          <button class="seg-btn" data-value="light" data-i18n="theme_light">浅色</button>
          <button class="seg-btn" data-value="dark" data-i18n="theme_dark">深色</button>
          <button class="seg-btn active" data-value="system" data-i18n="theme_system">跟随系统</button>
        </div>
      </div>
    </div>

    <div class="group">
      <div class="row" style="flex-direction: column; align-items: stretch; gap: 10px; cursor: default;">
        <div class="row-info">
          <div class="row-title" data-i18n="scroll_mode">滚动模式</div>
        </div>
        <div class="segment" id="scroll-mode">
          <button class="seg-btn active" data-value="smooth" data-i18n="smooth">平滑</button>
          <button class="seg-btn" data-value="instant" data-i18n="instant">瞬移</button>
        </div>
      </div>
    </div>

  </div>

  <div id="status" class="status-bar active">
    <span data-i18n="status_active">导航已启用</span>
  </div>

  <div class="footer">
    <a id="review-link" href="https://chromewebstore.google.com/" target="_blank" rel="noreferrer" class="star-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path></svg>
      <span class="star-copy">
        <span class="star-title" data-i18n="review_support">好评支持</span>
        <span class="star-desc" data-i18n="review_support_desc">前往 Chrome 商店评分，帮助更多用户发现 ChatDot</span>
      </span>
    </a>
    <div class="footer-bottom">
      <div class="version">
        <span data-i18n="version">版本</span> <span id="version-num">1.0.0</span>
      </div>
      <a id="github-link" href="https://github.com/Lcc1ccl/chatdot" target="_blank" rel="noreferrer" class="icon-link" data-i18n-title="github_repo" data-i18n-aria-label="github_repo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path></svg>
      </a>
    </div>
  </div>

  <div id="changelog-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="changelog-title">
      <div class="modal-header">
        <div class="modal-title" id="changelog-title" data-i18n="changelog_title">更新日志</div>
        <button id="changelog-close" class="modal-close" type="button" data-i18n-title="changelog_close" data-i18n-aria-label="changelog_close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="changelog-list"></div>
    </div>
  </div>

  <script src="popup-logic.js"></script>
  <script src="popup.js"></script>
</body>
</html>
