<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatDot Navigator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .header .version {
      font-size: 11px;
      color: #6e6e80;
      margin-left: auto;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 12px 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-row label {
      font-size: 13px;
      color: #b0b0c0;
    }

    /* 开关 */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #3a3a4a;
      border-radius: 22px;
      transition: 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #6366f1;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }

    .status {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: #a0a0ff;
      text-align: center;
    }

    .status.inactive {
      background: rgba(255, 100, 100, 0.08);
      border-color: rgba(255, 100, 100, 0.15);
      color: #ff9090;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #4a4a5a;
    }

    .footer a {
      color: #6366f1;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <h1>ChatDot Navigator</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div class="divider"></div>

  <div class="toggle-row">
    <label for="toggle-enabled">启用导航栏</label>
    <div class="switch">
      <input type="checkbox" id="toggle-enabled" checked>
      <span class="slider"></span>
    </div>
  </div>

  <div id="status" class="status">
    ✅ 导航侧边栏已激活
  </div>

  <div class="divider"></div>

  <div class="footer">
    灵感来自 <a href="https://github.com/YishenTu/claudian" target="_blank">Claudian</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
